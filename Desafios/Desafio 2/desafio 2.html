<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="camarão.png" type="image/x-icon">
    <title>Tags html5</title>
</head>
<body>
    
    <h1><marquee behavior="" direction="right">Olá!</marquee></h1>
    <p>Em html5 podemos iserir os elementos da lista a seguir passe
    o mouse sobre os termos para descobrir qual tag deverá utilizar em cada caso.</p>
    <h1>Tags html5</h1>
    <ul type = "square">
        <li><abbr title="Tag <p>">Parágrafo</abbr>
        <li><abbr title="Tag <title>">Títulos</abbr>
        <li><abbr title="Tag <img>">Imagens</abbr>
        <li><abbr title="Tag <abbr>">Abreviações</abbr>
        <li><abbr title="Tag <code>">Códigos-fonte</abbr>
        <li><abbr title="Tag <ol>">Listas numeradas</abbr>
        <li><abbr title="Tag <ul>">Lista com dermacadores</abbr>
    </ul>
    <img src="gif.gif" alt="Mão de gato dando tchau">
    <h1><marquee behavior="" direction="right">Tchau!</marquee></h1>

</body>
</html>
